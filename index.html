<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Draw - You Have 2 Free Spins!</title>

    <style>
        :root { 
            --gold: #fbc02d; 
            --red: #e53935;
            --bg-dark: #0f0f13;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000;
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center 40%, #2a1b1b 0%, #000 80%); 
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-top: 20px;
        }

        /* 顶部 LOGO */
        .logo-container { text-align: center; margin-bottom: 5px; animation: fadeIn 1s ease-in; }
        .main-logo { height: 160px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(251, 192, 45, 0.4)); }

        /* 标题区 */
        .header-text { text-align: center; padding: 0 20px; margin-bottom: 25px; min-height: 70px;}
        .header-text h1 { font-size: 24px; color: var(--gold); margin-bottom: 8px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .header-text p { font-size: 14px; color: #ddd; background: rgba(229, 57, 53, 0.2); border: 1px solid rgba(229, 57, 53, 0.5); display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; line-height: 1.4; transition: 0.3s;}
        
        /* 错误提示高亮状态 */
        .error-msg { background: rgba(158, 158, 158, 0.2) !important; border-color: #777 !important; color: #fff !important;}
        .error-msg span { color: #ff5252; font-weight: 900;}

        /* 盲盒游戏区 */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .boxes-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 0 20px;
        }
        .box {
            width: 30%;
            max-width: 100px;
            aspect-ratio: 1;
            background: radial-gradient(circle, rgba(251,192,45,0.15) 0%, transparent 80%); 
            border: 1px solid rgba(251, 192, 45, 0.3); 
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px; 
            cursor: pointer;
            position: relative;
            animation: bounce 2s infinite;
            transition: all 0.3s;
        }
        .box:nth-child(2) { animation-delay: 0.2s; }
        .box:nth-child(3) { animation-delay: 0.4s; }
        .box:hover:not(.opened) { filter: drop-shadow(0 0 15px var(--gold)); transform: scale(1.05); }

        /* 首次点击变空的样式 */
        .box.opened {
            animation: none !important;
            background: transparent !important;
            border: 1px dashed #555 !important;
            box-shadow: none !important;
            filter: grayscale(100%) opacity(0.5);
            cursor: not-allowed;
            transform: scale(0.95);
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .shake-anim { animation: shake 0.5s !important; }
        @keyframes shake { 0% { transform: translateX(0); } 20% { transform: translateX(-10px) rotate(-10deg); } 40% { transform: translateX(10px) rotate(10deg); } 60% { transform: translateX(-10px) rotate(-10deg); } 80% { transform: translateX(10px) rotate(10deg); } 100% { transform: translateX(0); } }

        /* 隐藏的领奖区 */
        .result-area {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        
        .win-title { font-size: 26px; color: #fff; text-align: center; margin-bottom: 15px; line-height: 1.3;}
        .win-title span { color: var(--gold); font-size: 34px; font-weight: 900; display: block; text-shadow: 0 0 20px rgba(251, 192, 45, 0.8); }

        /* 按钮区 */
        .action-area { padding: 0 20px 20px; width: 100%; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; padding: 12px 5px; border-radius: 16px; color: white; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 20px rgba(0,0,0,0.5); position: relative; overflow: hidden;}
        .btn-tg { background: linear-gradient(135deg, #1c82b6, #24A1DE); }
        .btn-viber { background: linear-gradient(135deg, #5d4ed1, #7360f2); }
        .btn img { width: 52px; height: 52px; margin-bottom: 6px; object-fit: contain; z-index: 2;}
        .tg-fix { transform: scale(1.15); } 
        .viber-fix { transform: scale(1.25); }
        .btn span.main { font-weight: 800; font-size: 15px; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.3);}
        .btn span.sub { font-size: 11px; opacity: 0.85; margin-top: 3px; z-index: 2;}
        .btn::after { content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg); animation: shine 3s infinite; z-index: 1;}

        /* 官方合作信任区 */
        .trust-section { width: 100%; margin-bottom: 10px; margin-top: auto;}
        .trust-divider { display: flex; align-items: center; text-align: center; color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .trust-divider::before, .trust-divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0 15px; }
        
        .trust-icons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 15px; padding: 0 50px; justify-items: center; align-items: center; }
        .trust-icons-grid img { height: 60px; max-width: 150px; object-fit: contain; border-radius: 16px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)) grayscale(10%); }
        .kpay-fix { clip-path: inset(3px round 16px); }

        .footer { text-align: center; font-size: 11px; color: #555; padding-bottom: 15px; }
        
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <!-- LOGO -->
        <div class="logo-container">
            <img src="logo.webp" alt="VIP Logo" class="main-logo">
        </div>

        <!-- 游戏阶段：标题与盲盒 -->
        <div class="game-area" id="gameArea">
            <div class="header-text">
                <h1>ရွှေဘောက်စ်ကို ရွေးချယ်ပါ!</h1>
                <!-- 提示修改为：2次机会 -->
                <p id="spin-text">အခမဲ့ဖွင့်ခွင့် (၂) ကြိမ် ရှိပါသည်</p>
            </div>
            
            <div class="boxes-container">
                <div class="box" onclick="openBox(this)">🎁</div>
                <div class="box" onclick="openBox(this)">🎁</div>

        <!-- 结果阶段：领奖区 -->
        <div class="result-area" id="resultArea">
            <div class="win-title">
                ဂုဏ်ယူပါတယ်! သင်ရရှိသည်မှာ<br>
                <span>100% NEW BONUS</span>
            </div>
            
            <div class="action-area">
                <div class="btn-group">
                    <a href="https://6tjzk.bemobtrcks.com/click/1" class="btn btn-tg">
                        <img src="telegram.webp" alt="Telegram" class="tg-fix">

        <!-- 官方合作展示区 -->
        <div class="trust-section">

            <div class="trust-icons-grid">

        </div>

        <div class="footer">

        </div>
    </div>

    <!-- 游戏逻辑脚本 (新增心跳空枪逻辑) -->
    <script>
        let clickCount = 0;

        function openBox(element) {
            // 如果这个盒子已经被点过了，或者游戏已经结束，不作反应
            if (element.classList.contains('opened') || clickCount >= 2) return;

            if (clickCount === 0) {
                // 【第一枪】 - 必定是空盒
                element.classList.add('opened');
                element.innerHTML = '❌'; // 变成叉叉
                
                // 更新顶部文字：哎呀，空的！再试一次 (剩1次)
                let spinText = document.getElementById('spin-text');
                spinText.classList.add('error-msg');
                spinText.innerHTML = 'နှမြောစရာပါ! ဗလာဖြစ်နေပါတယ်။<br>နောက်တစ်ကြိမ် ထပ်ကြိုးစားကြည့်ပါ! <span>(၁ ကြိမ် ကျန်ပါသေးသည်)</span>';
                
                clickCount++;
            } 
            else if (clickCount === 1) {
                // 【第二枪】 - 必定是大奖
                element.classList.add('shake-anim');
                
                // 让其他盒子变暗
                let allBoxes = document.querySelectorAll('.box');
                allBoxes.forEach(b => {
                    if(b !== element) b.style.opacity = '0.3';
                });

                // 延迟0.6秒后显示大奖页面
                setTimeout(() => {
                    document.getElementById('gameArea').style.display = 'none';
                    let resultArea = document.getElementById('resultArea');
                    resultArea.style.display = 'flex';
                }, 600);
                
                clickCount++;
            }
        }
    </script>
</body>
</html>
